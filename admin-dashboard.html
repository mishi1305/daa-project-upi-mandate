<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexiP₹ice | Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Admin Dashboard</h1>
    <p>Manage flights and pricing control.</p>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Flight Inventory</h2>
      <div class="row">
        <button onclick="refreshFlights()">Refresh Flights</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Route</th><th>Departure</th><th>Base</th><th>Current</th><th>Seats</th></tr>
          </thead>
          <tbody id="flightTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Add Flight</h2>
      <div class="row">
        <input id="fromCity" placeholder="From">
        <input id="toCity" placeholder="To">
        <input id="depTime" placeholder="HH:MM">
      </div>
      <div class="row">
        <input id="basePrice" type="number" placeholder="Base Price">
        <input id="seats" type="number" placeholder="Seats">
        <button onclick="addFlight()">Add Flight</button>
      </div>
    </section>

    <section class="card">
      <h2>Pricing Mechanism</h2>
      <div class="row">
        <input id="minMul" type="number" step="0.01" placeholder="Min Multiplier">
        <input id="maxMul" type="number" step="0.01" placeholder="Max Multiplier">
        <button onclick="updatePricing()">Update Pricing</button>
      </div>
    </section>
  </main>

  <section class="statusbar">
    <div class="row between">
      <p id="status">Ready</p>
      <div>
        <a class="ghost-link" href="index.html">Home</a>
        <button onclick="logoutAdmin()">Logout</button>
      </div>
    </div>
  </section>

  <script src="common.js"></script>
  <script src="admin-dashboard.js"></script>
</body>
</html>
