<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexiP₹ice | User Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>User Dashboard</h1>
    <p id="welcomeText">Manage booking, mandate, and pricing checks.</p>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Dynamic Pricing & Flights</h2>
      <div class="row">
        <button onclick="refreshFlights()">Refresh Live Prices</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Route</th><th>Departure</th><th>Base</th><th>Current</th><th>Seats</th></tr>
          </thead>
          <tbody id="flightTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>UPI Mandate</h2>
      <div class="row">
        <input id="mandateUpiId" placeholder="UPI ID (you@bank)">
        <input id="mandateLimit" type="number" placeholder="Limit Amount">
        <input id="mandateMinutes" type="number" placeholder="Validity Minutes">
        <button onclick="createMandate()">Create Mandate</button>
      </div>
      <div id="mandateLive" class="hint"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Type</th><th>Booking ID</th><th>Amount</th><th>Balance After</th><th>Time</th></tr>
          </thead>
          <tbody id="mandateHistoryTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Booking & Auto-Booking</h2>
      <div class="row">
        <input id="manualFlightId" placeholder="Flight ID">
        <button onclick="manualBook()">Manual Book</button>
      </div>
      <div class="row">
        <input id="autoFrom" placeholder="From">
        <input id="autoTo" placeholder="To">
        <input id="budget" type="number" placeholder="Budget">
        <input id="latestTime" placeholder="Latest HH:MM">
      </div>
      <div class="row">
        <button onclick="autoBook()">Auto Book</button>
        <button onclick="cheapestRoute()">Find Cheapest</button>
      </div>
      <p id="cheapestOut" class="hint"></p>
    </section>

    <section class="card">
      <h2>Cancellation & Refund</h2>
      <div class="row">
        <input id="cancelBookingId" placeholder="Booking ID">
        <button onclick="cancelBooking()">Cancel Booking</button>
      </div>
    </section>

    <section class="card">
      <h2>Your Bookings</h2>
      <div class="row">
        <input id="bookingSearch" placeholder="Search by Booking or Flight ID" oninput="renderBookingTable()">
        <button onclick="viewBookings()">Refresh Bookings</button>
      </div>
      <p id="bookingSearchHint" class="hint"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Flight</th><th>Status</th><th>Paid</th><th>Refund</th></tr>
          </thead>
          <tbody id="bookingTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <section class="statusbar">
    <div class="row between">
      <p id="status">Ready</p>
      <div>
        <a class="ghost-link" href="index.html">Home</a>
        <button onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </section>

  <div id="popupOverlay" class="popup-overlay" style="display:none;">
    <div class="popup">
      <div id="popupMessage" class="popup-message">Message</div>
      <div class="popup-actions">
        <button onclick="closePopup()">OK</button>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="user-dashboard.js"></script>
</body>
</html>
