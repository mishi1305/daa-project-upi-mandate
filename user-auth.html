<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexiP₹ice | User Sign In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>User Access</h1>
    <p>Register or sign in to continue to the user dashboard.</p>
  </header>

  <main class="center-wrap">
    <section class="card role-card wide">
      <h2>User Authentication</h2>
      <div class="row">
        <input id="name" placeholder="Name">
      </div>
      <div class="row">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
      </div>
      <div class="row">
        <button onclick="registerUser()">Register</button>
        <button onclick="loginUser()">Login</button>
        <a class="ghost-link" href="index.html">Back to Home</a>
      </div>
      <p id="status" class="hint">Ready</p>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="user-auth.js"></script>
</body>
</html>
