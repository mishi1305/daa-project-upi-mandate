<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexiP₹ice | Admin Sign In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Admin Access</h1>
    <p>Authorized administrators can manage flights and pricing.</p>
  </header>

  <main class="center-wrap">
    <section class="card role-card wide">
      <h2>Admin Authentication</h2>
      <div class="row">
        <input id="adminEmail" placeholder="Admin Email">
        <input id="adminPassword" type="password" placeholder="Password">
      </div>
      <div class="row">
        <button onclick="adminLogin()">Login</button>
        <a class="ghost-link" href="index.html">Back to Home</a>
      </div>
      <p id="status" class="hint">Ready</p>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="admin-login.js"></script>
</body>
</html>
